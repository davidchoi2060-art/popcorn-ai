<script>
(function(){var KEY="popcorn-gate-ok";var PASS="WnRnal";
if(localStorage.getItem(KEY)==="1")return;
var ov=document.createElement("div");ov.id="__gate";
ov.setAttribute("style","position:fixed;inset:0;z-index:99999;background:#17171b;display:flex;align-items:center;justify-content:center;font-family:Pretendard,-apple-system,sans-serif;");
ov.innerHTML='<div style="width:min(340px,86vw);background:#fff;border-radius:20px;padding:30px 26px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;box-sizing:border-box;"><div style="font-size:16px;font-weight:900;color:#17171b;">팝콘PC <span style="color:#2b5fd9;">AI</span> · 내부 검토</div><p style="margin:10px 0 18px;font-size:13px;color:#8a8578;font-weight:600;">접근 암호를 입력하세요.</p><input id="__gp" type="password" autocomplete="off" placeholder="암호" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid #e6e2da;border-radius:12px;font-size:14px;font-family:inherit;outline:none;"><p id="__ge" style="margin:8px 0 0;font-size:12px;color:#b31b25;font-weight:700;height:14px;"></p><button id="__gb" style="margin-top:12px;width:100%;padding:12px;border:none;background:#2b5fd9;color:#fff;border-radius:12px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;">입장</button></div>';
function go(){document.body.appendChild(ov);var inp=document.getElementById("__gp"),err=document.getElementById("__ge"),btn=document.getElementById("__gb");function s(){if(inp.value===PASS){localStorage.setItem(KEY,"1");ov.remove();}else{err.textContent="암호가 올바르지 않습니다.";inp.value="";inp.focus();}}btn.addEventListener("click",s);inp.addEventListener("keydown",function(e){if(e.key==="Enter")s();});inp.focus();}
if(document.body)go();else document.addEventListener("DOMContentLoaded",go);})();
</script>

  <div class="card" style="display:flex;flex-wrap:wrap;gap:22px;align-items:center;margin-bottom:16px;">
    <div><div style="font-size:12px;color:#8a8578;font-weight:700;">이번 달 결제</div><b id="mp-month" style="font-size:22px;color:#17171b;">1,735,000원</b></div>
    <span style="width:1px;height:26px;background:#ece9e3;"></span>
    <div><div id="mp-total-label" style="font-size:12px;color:#8a8578;font-weight:700;">누적 결제 (3건)</div><b id="mp-total" style="font-size:22px;color:#17171b;">3,831,000원</b></div>
    <span style="margin-left:auto;font-size:12px;color:#8a8578;font-weight:600;">결제 방식(자체/쇼핑몰 인계)과 무관하게 전 건이 기록됩니다.</span>
  </div>

<script>
(function(){
var periph=[];try{periph=JSON.parse(localStorage.getItem('popcorn-periph')||'[]');}catch(e){}
var psum=0;periph.forEach(function(x){psum+=x.p;});
var PAYS=[
 {at:'오늘 14:22',order:'ORD-84216',method:'신용카드',mode:'own',amount:1735000+psum,state:'승인'},
 {at:'07-14 11:05',order:'ORD-84213',method:'신용카드',mode:'own',amount:812000,state:'승인'},
 {at:'06-28 16:40',order:'ORD-83907',method:'쇼핑몰 결제',mode:'mall',amount:1284000,state:'승인'}
];
var won=function(n){return n.toLocaleString()+'원';};
var stCol={'승인':['#eaf1fd','#2149b0'],'취소':['#f4f2ec','#6b6b73'],'환불':['#fbecec','#8a1f22']};
function render(rows){
 if(!rows.length){document.getElementById('plist').innerHTML='<div style="padding:26px 0;text-align:center;font-size:13px;color:#8a8578;font-weight:600;">결제 내역이 없습니다.</div>';return;}
 document.getElementById('plist').innerHTML=rows.map(function(p){
  var c=stCol[p.state]||['#f4f2ec','#6b6b73'];
  return '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:15px 0;border-bottom:1px solid #f0eee9;">'
   +'<span style="flex:0 0 92px;font-size:12.5px;color:#8a8578;font-weight:700;">'+p.at+'</span>'
   +'<div style="flex:1;min-width:180px;"><b style="font-size:14px;color:#17171b;">'+p.method+'</b> <span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;'+(p.mode==='own'?'background:#eaf1fd;color:#2149b0;':'background:#f2edfb;color:#4a2a94;')+'">'+(p.mode==='own'?'자체':'쇼핑몰 인계')+'</span>'
   +'<div style="font-size:12px;color:#8a8578;font-weight:600;margin-top:2px;"><a href="my-orders.html?id='+p.order+'" style="color:#2b5fd9;text-decoration:none;font-weight:800;">'+p.order+'</a> 주문</div></div>'
   +'<span style="font-size:12px;font-weight:800;padding:4px 11px;border-radius:999px;background:'+c[0]+';color:'+c[1]+';">'+p.state+'</span>'
   +'<b style="font-size:15px;color:#17171b;font-variant-numeric:tabular-nums;">'+won(p.amount)+'</b></div>';
 }).join('');
}
render(PAYS);
var total=0;PAYS.forEach(function(p){total+=p.amount;});
document.getElementById('mp-total').textContent=won(total);
document.getElementById('mp-month').textContent=won(PAYS[0].amount);

// ---- LIVE (슬라이스 12) — popcorn-member 있고 API 성공 시 결제 원장 전 행으로 교체, 아니면 더미 원형 ----
// 더미 첫 행의 psum 가산은 리터럴 전용 — 실데이터 amount는 결제 실액(주변기기 포함)이라 재적용 금지(이중 계상).
function fmtT(iso){
 var d=new Date(iso),now=new Date();
 var hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
 if(d.toDateString()===now.toDateString())return '오늘 '+hm;
 return String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+hm;
}
var mem=null;try{mem=JSON.parse(localStorage.getItem('popcorn-member')||'null');}catch(e){}
if(mem&&mem.email){
 fetch('/api/my/payments?email='+encodeURIComponent(mem.email))
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(d){
   var rows=d.items.map(function(p){return {at:p.at?fmtT(p.at):'—',order:p.order_no,method:p.method,mode:p.mode,amount:p.amount,state:p.status};});
   render(rows);
   // KPI — 응답 rows 단일 원천. 합계는 승인·환불만(취소는 돈이 안 움직임), 건수는 원장 전 행.
   var now=new Date(),month=0,sum=0;
   d.items.forEach(function(p){
    if(p.status!=='승인'&&p.status!=='환불')return;
    sum+=p.amount;
    if(p.at){var t=new Date(p.at);if(t.getFullYear()===now.getFullYear()&&t.getMonth()===now.getMonth())month+=p.amount;}
   });
   document.getElementById('mp-month').textContent=won(month);
   document.getElementById('mp-total').textContent=won(sum);
   document.getElementById('mp-total-label').textContent='누적 결제 ('+d.items.length+'건)';
  }).catch(function(){});
}
})();
</script>
