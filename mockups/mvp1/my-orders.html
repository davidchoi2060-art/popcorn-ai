<script>
(function(){var KEY="popcorn-gate-ok";var PASS="WnRnal";
if(localStorage.getItem(KEY)==="1")return;

ov.setAttribute("style","position:fixed;inset:0;z-index:99999;background:#17171b;display:flex;align-items:center;justify-content:center;font-family:Pretendard,-apple-system,sans-serif;");
ov.innerHTML='<div style="width:min(340px,86vw);background:#fff;border-radius:20px;padding:30px 26px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;box-sizing:border-box;"><div style="font-size:16px;font-weight:900;color:#17171b;">팝콘PC <span style="color:#2b5fd9;">AI</span> · 내부 검토</div><p style="margin:10px 0 18px;font-size:13px;color:#8a8578;font-weight:600;">접근 암호를 입력하세요.</p><input id="__gp" type="password" autocomplete="off" placeholder="암호" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid #e6e2da;border-radius:12px;font-size:14px;font-family:inherit;outline:none;"><p id="__ge" style="margin:8px 0 0;font-size:12px;color:#b31b25;font-weight:700;height:14px;"></p><button id="__gb" style="margin-top:12px;width:100%;padding:12px;border:none;background:#2b5fd9;color:#fff;border-radius:12px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;">입장</button></div>';
function go(){document.body.appendChild(ov);var inp=document.getElementById("__gp"),err=document.getElementById("__ge"),btn=document.getElementById("__gb");function s(){if(inp.value===PASS){localStorage.setItem(KEY,"1");ov.remove();}else{err.textContent="암호가 올바르지 않습니다.";inp.value="";inp.focus();}}btn.addEventListener("click",s);inp.addEventListener("keydown",function(e){if(e.key==="Enter")s();});inp.focus();}
if(document.body)go();else document.addEventListener("DOMContentLoaded",go);})();
</script>

<script>
(function(){
// ---- 데이터 (목업 — 주문 시점 스냅샷 원칙) ----
var periph=[];try{periph=JSON.parse(localStorage.getItem('popcorn-periph')||'[]');}catch(e){}
var psum=0;periph.forEach(function(x){psum+=x.p;});
var ORDERS=[
 {no:'ORD-84216',date:'오늘 14:22',channel:'own',status:'조립중',step:2,
  items:[['CPU','Intel Core i7-14700K',580000],['GPU','NVIDIA RTX 4070 Ti SUPER',420000],['메인보드','MSI MAG Z790 Tomahawk WiFi',250000],['메모리','삼성 DDR5-5600 32GB (16×2)',120000],['SSD','삼성 990 PRO 1TB NVMe',135000],['파워','시소닉 FOCUS GX-750 750W',110000],['케이스','NZXT H5 Flow',90000],['조립·검수','전문가 조립 · 선정리 · 24시간 검사',30000]].concat(periph.map(function(x){return [x.c+' (함께 구성)',x.n,x.p];})),
  total:1735000+psum,pay:{method:'신용카드 (자체 결제)',state:'승인',at:'오늘 14:22'},ship:null,refund:null},
 {no:'ORD-84213',date:'07-14 11:05',channel:'own',status:'배송중',step:3,
  items:[['구성 요약','라이젠5 7600 · RTX 4060 구성 (7종) + 조립·검수',812000]],
  total:812000,pay:{method:'신용카드 (자체 결제)',state:'승인',at:'07-14 11:05'},ship:{carrier:'CJ대한통운',no:'6482-1234-5678'},refund:null},
 {no:'ORD-83907',date:'06-28 16:40',channel:'mall',status:'완료',step:4,
  items:[['구성 요약','라이젠5 5600 · RTX 3060 구성 (7종) + 조립·검수',1284000]],
  total:1284000,pay:{method:'쇼핑몰 결제 (인계)',state:'승인',at:'06-28 16:40'},ship:{carrier:'CJ대한통운',no:'6480-8821-3341'},refund:null}
];
var STEPS=['결제 완료','조립·검사','출고·배송','배송 완료'];
var cur='all', sel=null, LIVE=false;
function kindOf(st){return (st==='조립중'||st==='결제완료')?'주문 취소':(st==='완료'?'반품·교환':'환불');}
var won=function(n){return n.toLocaleString()+'원';};
function chBadge(ch){return ch==='own'?'<span style="background:#eaf1fd;color:#2149b0;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;">자체</span>':'<span style="background:#f2edfb;color:#4a2a94;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;">쇼핑몰 인계</span>';}
function stBadge(o){
 if(o.refund)return '<span style="background:#fbecec;color:#8a1f22;font-size:12px;font-weight:800;padding:4px 11px;border-radius:999px;">'+o.refund.kind+' 접수됨</span>';
 var col=o.status==='완료'?['#f4f2ec','#6b6b73']:['#fbf3e2','#8a561a'];
 return '<span style="background:'+col[0]+';color:'+col[1]+';font-size:12px;font-weight:800;padding:4px 11px;border-radius:999px;">'+o.status+'</span>';
}
function show(v){['v-list','v-detail','v-refund'].forEach(function(id){document.getElementById(id).style.display=id===v?'':'none';});window.scrollTo(0,0);}
// ---- 목록 ----
function matches(o){
 if(cur==='all')return true;
 if(cur==='progress')return (o.status==='조립중'||o.status==='결제완료')&&!o.refund;
 if(cur==='shipping')return o.status==='배송중'&&!o.refund;
 if(cur==='done')return o.status==='완료'&&!o.refund;
 if(cur==='refund')return !!o.refund;
 return true;
}
function renderList(){
 var F=[['all','전체'],['progress','진행 중'],['shipping','배송 중'],['done','완료'],['refund','취소·환불']];
 document.getElementById('filters').innerHTML=F.map(function(f){return '<span class="chip'+(cur===f[0]?' on':'')+'" data-f="'+f[0]+'">'+f[1]+'</span>';}).join('');
 document.querySelectorAll('#filters .chip').forEach(function(c){c.onclick=function(){cur=c.dataset.f;renderList();};});
 var list=ORDERS.filter(matches);
 document.getElementById('olist').innerHTML=list.length?list.map(function(o){
  return '<div class="card" data-o="'+o.no+'" style="cursor:pointer;display:flex;flex-wrap:wrap;align-items:center;gap:14px;">'
   +'<div style="flex:1;min-width:220px;">'
   +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;"><b style="font-size:14.5px;color:#17171b;">'+o.no+'</b>'+chBadge(o.channel)+stBadge(o)+'</div>'
   +'<div style="font-size:12.5px;color:#8a8578;font-weight:600;">'+o.date+' · '+o.items[0][1].slice(0,34)+(o.items.length>1?' 외':'')+'</div></div>'
   +'<b style="font-size:16px;color:#17171b;">'+won(o.total)+'</b>'
   +'<span class="msym" style="font-size:20px;color:#c9c5bd;">chevron_right</span></div>';
 }).join(''):'<div class="card" style="text-align:center;color:#a29d92;padding:40px;">이 분류의 주문이 없습니다.</div>';
 document.querySelectorAll('#olist [data-o]').forEach(function(el){el.onclick=function(){sel=el.dataset.o;renderDetail();show('v-detail');};});
}
// ---- 상세 ----
function order(){return ORDERS.filter(function(o){return o.no===sel;})[0];}
function renderDetail(){
 var o=order();if(!o)return;
 var steps='<div style="display:flex;align-items:center;gap:6px;margin:16px 0 4px;">'+STEPS.map(function(s,i){
  var onS=i<o.step;
  return '<div style="flex:1;text-align:center;"><div style="width:24px;height:24px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;'+(onS?'background:#2b5fd9;color:#fff;':'background:#eee9df;color:#a29d92;')+'">'+(i+1)+'</div><span style="font-size:11.5px;font-weight:700;'+(onS?'color:#17171b;':'color:#b5b0a4;')+'">'+s+'</span></div>'+(i<3?'<div style="flex:0.6;height:2px;background:'+(i<o.step-1?'#2b5fd9':'#e6e2da')+';margin-top:-16px;"></div>':'');
 }).join('')+'</div>';
 var rows=o.items.map(function(it){
  return '<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0eee9;"><span style="flex:0 0 96px;font-size:11.5px;font-weight:800;color:#8a8578;">'+it[0]+'</span><div style="flex:1;font-size:13.5px;font-weight:700;color:#17171b;">'+it[1]+'</div><b style="font-size:13.5px;color:#17171b;">'+won(it[2])+'</b></div>';
 }).join('');
 var rIdx=o.refund?Math.max(0,['접수','검토','수거·처리','완료'].indexOf(o.refund.status||'접수')):0;
 var refundBlock=o.refund?'<div class="card" style="background:#fbecec;border-color:#f0cfd1;margin-bottom:14px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span class="msym" style="font-size:19px;color:#b31b25;">assignment_return</span><b style="font-size:14px;color:#8a1f22;">'+o.refund.kind+' 접수 '+o.refund.no+'</b><span style="font-size:12px;color:#a15055;font-weight:700;">· '+o.refund.reason+'</span></div><div style="display:flex;gap:6px;flex-wrap:wrap;">'+['접수','검토','수거·처리','완료'].map(function(s,i){return '<span style="font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:999px;'+(i===rIdx?'background:#b31b25;color:#fff;':'background:#fff;color:#a15055;')+'">'+s+'</span>';}).join('')+'</div><p style="margin:8px 0 0;font-size:12px;color:#a15055;font-weight:600;">'+o.refund.modeNote+'</p></div>':'';
 var actions='';
 if(!o.refund){
  var kind=kindOf(o.status);
  actions='<button class="btn2" id="d-refund" style="color:#8a1f22;border-color:#e8c9cb;">'+kind+' 접수</button>';
 }
 document.getElementById('v-detail').innerHTML=
  '<a href="#!" id="d-back" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:#8a8578;text-decoration:none;margin-bottom:14px;"><span class="msym" style="font-size:17px;">arrow_back</span>주문 목록</a>'
  +refundBlock
  +'<div class="card" style="margin-bottom:14px;">'
  +'<div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;"><h2 style="margin:0;font-size:19px;font-weight:900;color:#17171b;">'+o.no+'</h2>'+chBadge(o.channel)+stBadge(o)+'<span style="margin-left:auto;font-size:12.5px;color:#8a8578;font-weight:600;">'+o.date+'</span></div>'
  +steps+'</div>'
  +'<div class="card" style="margin-bottom:14px;"><h3 style="margin:0 0 6px;font-size:15px;font-weight:900;color:#17171b;">주문 구성 <span style="font-size:11.5px;font-weight:700;color:#6a3fbf;background:#f2edfb;padding:3px 9px;border-radius:999px;">주문 시점 스냅샷</span></h3><p style="margin:0 0 8px;font-size:12px;color:#8a8578;font-weight:600;">이후 가격이 변해도 이 주문에는 영향이 없습니다 — 그때 가격·사양 그대로 보존됩니다.</p>'+rows
  +'<div style="display:flex;justify-content:space-between;padding-top:12px;"><b style="font-size:14px;color:#8a8578;">총 결제금액</b><b style="font-size:17px;color:#17171b;">'+won(o.total)+'</b></div></div>'
  +'<div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">'
  +'<div class="card"><h3 style="margin:0 0 10px;font-size:14px;font-weight:900;color:#17171b;display:flex;align-items:center;gap:7px;"><span class="msym" style="font-size:18px;color:#2b5fd9;">credit_card</span>결제</h3><div style="font-size:13px;color:#55555c;line-height:1.9;">'+o.pay.method+'<br>상태: <b style="color:#17171b;">'+o.pay.state+'</b> · '+o.pay.at+'</div><a href="my-payments.html" style="font-size:12.5px;font-weight:800;color:#2b5fd9;text-decoration:none;">결제 내역에서 보기 →</a></div>'
  +'<div class="card"><h3 style="margin:0 0 10px;font-size:14px;font-weight:900;color:#17171b;display:flex;align-items:center;gap:7px;"><span class="msym" style="font-size:18px;color:#2b5fd9;">local_shipping</span>배송</h3><div style="font-size:13px;color:#55555c;line-height:1.9;">'+(o.ship?(o.ship.carrier+'<br>송장 <b style="color:#17171b;">'+o.ship.no+'</b>'):'출고 전 — 조립·검사가 끝나면 송장이 등록됩니다.')+'</div></div>'
  +'</div>'
  +'<div style="display:flex;gap:10px;">'+actions+'<a class="btn2" href="s2-result.html">그때 견적서 다시 보기</a>'+(o.status==='완료'?'<a class="btnp" href="my-page.html">후기 쓰기</a>':'')+'</div>';
 document.getElementById('d-back').onclick=function(e){e.preventDefault();renderList();show('v-list');};
 var rb=document.getElementById('d-refund');if(rb)rb.onclick=function(){renderRefund();show('v-refund');};
}
// ---- 취소·환불·반품 접수 ----
function opsRefund(){var ops={};try{ops=JSON.parse(localStorage.getItem('popcorn-ops')||'{}');}catch(e){}return ops.refund==='own'?'own':'mall';}
function renderRefund(){
 var o=order();if(!o)return;
 var kind=kindOf(o.status);
 var mode=LIVE?(o.refund_mode||'mall'):opsRefund();
 var modeNote=mode==='own'
  ?'자체 환불 처리 모드 — 접수 즉시 검토가 시작되고, 승인 시 결제 수단으로 환불됩니다.'
  :'현재 환불 처리는 <b>쇼핑몰 인계 모드</b>입니다 — 접수는 여기서 받고, 처리는 기존 쇼핑몰 절차로 진행됩니다. 진행 상태는 이 주문에 계속 표시됩니다.';
 var REASONS=['단순 변심','초기 불량','오배송·구성 오류','기타'];
 document.getElementById('v-refund').innerHTML=
  '<a href="#!" id="r-back" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:#8a8578;text-decoration:none;margin-bottom:14px;"><span class="msym" style="font-size:17px;">arrow_back</span>주문 상세</a>'
  +'<div class="card" style="margin-bottom:14px;"><h2 style="margin:0 0 4px;font-size:19px;font-weight:900;color:#17171b;">'+kind+' 접수</h2><p style="margin:0;font-size:13px;color:#8a8578;font-weight:600;">'+o.no+' · '+won(o.total)+' · '+o.date+'</p></div>'
  +'<div class="card" style="margin-bottom:14px;"><h3 style="margin:0 0 12px;font-size:14.5px;font-weight:900;color:#17171b;">사유를 선택해 주세요</h3><div id="r-reasons" style="display:flex;gap:8px;flex-wrap:wrap;">'+REASONS.map(function(r){return '<span class="chip" data-r="'+r+'">'+r+'</span>';}).join('')+'</div>'
  +'<textarea id="r-note" placeholder="상세 내용 (선택)" style="width:100%;margin-top:12px;padding:12px 14px;border:1.5px solid #e6e2da;border-radius:11px;font-size:13.5px;font-family:inherit;outline:none;min-height:70px;resize:vertical;"></textarea></div>'
  +'<div class="card" style="background:#fbf3e2;border-color:#e6c98f;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;"><span class="msym" style="font-size:19px;color:#8a561a;flex:none;">info</span><p style="margin:0;font-size:12.5px;color:#8a561a;line-height:1.65;font-weight:600;">'+modeNote+'<br><span style="color:#a58044;">'+(kind==='주문 취소'?'조립 착수 전 취소는 전액 환불됩니다. 예약된 재고(hold)는 즉시 해제됩니다.':'초기 불량은 수령 7일 내 교환 우선, 왕복 택배비는 당사 부담입니다.')+'</span></p></div>'
  +'<div style="display:flex;gap:10px;"><button class="btnp" id="r-submit" disabled style="background:#c9c5bd;cursor:not-allowed;">접수하기</button><button class="btn2" id="r-cancel">돌아가기</button></div>';
 var reason=null;
 document.querySelectorAll('#r-reasons .chip').forEach(function(c){c.onclick=function(){reason=c.dataset.r;document.querySelectorAll('#r-reasons .chip').forEach(function(x){x.classList.toggle('on',x===c);});var b=document.getElementById('r-submit');b.disabled=false;b.style.background='#2b5fd9';b.style.cursor='pointer';};});
 document.getElementById('r-back').onclick=function(e){e.preventDefault();show('v-detail');};
 document.getElementById('r-cancel').onclick=function(){show('v-detail');};
 document.getElementById('r-submit').onclick=function(){
  if(!reason)return;
  var noteOf=function(m){return m==='own'?'자체 처리 — 검토 후 결제 수단으로 환불됩니다.':'쇼핑몰 인계 모드 — 처리는 쇼핑몰 절차, 상태는 여기에 표시됩니다. (주문 원장은 본 시스템)';};
  if(LIVE){
   var sb=document.getElementById('r-submit');sb.disabled=true;sb.textContent='접수 중…';
   var member=null;try{member=JSON.parse(localStorage.getItem('popcorn-member')||'null');}catch(e){}
   fetch('/api/my/refunds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_no:o.no,email:member?member.email:'',reason_type:reason})})
    .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
    .then(function(res){
     if(!res.ok){var d=res.j.detail||{};alert('접수 실패: '+(d.detail||d.error||'잠시 후 다시 시도해 주세요'));sb.disabled=false;sb.textContent='접수하기';return;}
     o.refund={kind:kind,no:res.j.refund_no,reason:reason,status:res.j.status,modeNote:noteOf(res.j.mode)};
     renderDetail();show('v-detail');
    })
    .catch(function(){alert('접수에 실패했어요 — 잠시 후 다시 시도해 주세요.');sb.disabled=false;sb.textContent='접수하기';});
   return;
  }
  o.refund={kind:kind,no:'RF-1024',reason:reason,modeNote:noteOf(mode)};
  renderDetail();show('v-detail');
 };
}
// ---- 초기화: ?id= 딥링크 ----
renderList();
var qid=new URLSearchParams(location.search).get('id');
if(qid&&ORDERS.some(function(o){return o.no===qid;})){sel=qid;renderDetail();show('v-detail');}
// ---- LIVE (슬라이스 10) — popcorn-member 있고 API 성공 시 회원 주문으로 교체(회원 경계), 아니면 더미 원형 ----
// 주변기기 concat은 더미 리터럴 전용 — LIVE는 order_items에 이미 포함되어 자연 우회.
function fmtT(iso){
 var d=new Date(iso),now=new Date();
 var hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
 if(d.toDateString()===now.toDateString())return '오늘 '+hm;
 return String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+hm;
}
var noteOfMode=function(m){return m==='own'?'자체 처리 — 검토 후 결제 수단으로 환불됩니다.':'쇼핑몰 인계 모드 — 처리는 쇼핑몰 절차, 상태는 여기에 표시됩니다. (주문 원장은 본 시스템)';};
var fromApi=function(o){return {no:o.no,date:fmtT(o.created_at),channel:o.channel,status:o.status,step:o.step,
 items:o.items,total:o.total,
 pay:o.pay?{method:o.pay.method,state:o.pay.state,at:o.pay.at?fmtT(o.pay.at):''}:{method:'결제 대기',state:'—',at:''},
 ship:o.ship,refund_mode:o.refund_mode,
 refund:o.refund?{kind:kindOf(o.status),no:o.refund.no,reason:o.refund.reason,status:o.refund.status,modeNote:noteOfMode(o.refund.mode)}:null};};
var mem=null;try{mem=JSON.parse(localStorage.getItem('popcorn-member')||'null');}catch(e){}
if(mem&&mem.email){
 fetch('/api/my/orders?email='+encodeURIComponent(mem.email))
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(d){
   LIVE=true;
   ORDERS=d.items.map(fromApi);
   renderList();
   if(qid){
    if(ORDERS.some(function(o){return o.no===qid;})){sel=qid;renderDetail();show('v-detail');}
    else{sel=null;show('v-list');}
   }
  })
  .catch(function(){});
}
})();
